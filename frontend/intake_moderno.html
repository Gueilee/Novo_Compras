<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Intake | Vendemmia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --grafite: #414042; --lilas: #422c76; --magenta: #ff2f69; --offwhite: #faf9f5; --verde: #01E18E; --branco: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--offwhite); margin: 0; padding: 30px; color: var(--grafite); }
        .secao { background: var(--branco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-top: 4px solid var(--lilas); margin-bottom: 25px; }
        h2 { color: var(--lilas); font-size: 18px; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .linha-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .grupo { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: var(--grafite); text-transform: uppercase; margin-bottom: 8px; }
        input, select { font-family: 'Inter', sans-serif; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 14px; outline: none; transition: border 0.3s; }
        input:focus, select:focus { border-color: var(--lilas); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: #f8f8fb; color: var(--lilas); padding: 12px; text-align: left; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        button { cursor: pointer; font-family: 'Inter', sans-serif; transition: 0.3s; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; }
        .btn-add { background: var(--offwhite); color: var(--lilas); border: 1px dashed var(--lilas); padding: 10px 15px; display: block; width: 100%; margin-top: 10px; }
        .btn-add:hover { background: #f0ecfc; }
        .btn-submit { background: var(--verde); color: var(--branco); padding: 15px 30px; width: 100%; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 10px rgba(1, 225, 142, 0.3); }
        .btn-submit:hover { transform: translateY(-2px); background: #00c47b; }
        .btn-remover { background: transparent; color: var(--magenta); font-size: 18px; padding: 5px; }
    </style>
</head>
<body>
    <div class="secao">
        <h2><i class="fa-solid fa-circle-info"></i> Dados Gerais da Requisição</h2>
        <div class="linha-form">
            <div class="grupo"><label>Unidade Solicitante</label><select id="unidade"><option value="VCI">VCI</option><option value="Garuva">Garuva</option></select></div>
            <div class="grupo"><label>Setor</label><input type="text" id="setor" placeholder="Ex: Qualidade"></div>
            <div class="grupo"><label>Nome do Solicitante</label><input type="text" id="comprador" placeholder="Seu nome"></div>
        </div>
    </div>
    <div class="secao">
        <h2><i class="fa-solid fa-box-open"></i> Itens da Requisição</h2>
        <table id="tabelaItens">
            <thead><tr><th>Descrição do Material / Serviço</th><th>Quantidade</th><th>Segmento (Categoria)</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn-add" onclick="adicionarLinha()"><i class="fa-solid fa-plus"></i> Adicionar Novo Item</button>
        <button class="btn-submit" onclick="enviarRequisicao()"><i class="fa-solid fa-paper-plane"></i> ENVIAR PARA APROVAÇÃO GESTOR</button>
    </div>

    <script>
        let categorias = [];
        window.onload = async () => {
            const resp = await fetch('http://localhost:8000/api/opcoes-formulario');
            const dados = await resp.json();
            Object.values(dados.categorias).forEach(arr => categorias = categorias.concat(arr));
            adicionarLinha();
        };

        function adicionarLinha() {
            const tbody = document.querySelector('#tabelaItens tbody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="desc" placeholder="Especificação detalhada" style="width: 100%; box-sizing: border-box;"></td>
                <td><input type="number" class="qtd" value="1" style="width: 100%; box-sizing: border-box;"></td>
                <td><select class="seg" style="width: 100%; box-sizing: border-box;">${categorias.map(c => `<option>${c}</option>`).join('')}</select></td>
                <td style="text-align: center;"><button class="btn-remover" onclick="this.closest('tr').remove()"><i class="fa-solid fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        }

        async function enviarRequisicao() {
            const itens = Array.from(document.querySelectorAll('#tabelaItens tbody tr')).map(tr => ({
                descricao: tr.querySelector('.desc').value, quantidade: parseFloat(tr.querySelector('.qtd').value), segmento: tr.querySelector('.seg').value
            })).filter(i => i.descricao);

            if(itens.length === 0) return alert("Adicione pelo menos um item.");

            const payload = {
                unidade: document.getElementById('unidade').value, setor: document.getElementById('setor').value,
                comprador: document.getElementById('comprador').value, itens: itens
            };

            const resp = await fetch('http://localhost:8000/requisicoes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if(resp.ok) { alert("Sucesso! Requisição enviada."); window.location.reload(); }
        }
    </script>
</body>
</html>
