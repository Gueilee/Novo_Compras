<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Vendemmia</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --grafite: #414042; --lilas: #422c76; --magenta: #ff2f69; --offwhite: #faf9f5; --verde: #01E18E; --branco: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--offwhite); margin: 0; padding: 30px; color: var(--grafite); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--branco); padding: 25px; border-radius: 12px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--lilas); display: flex; flex-direction: column; justify-content: center; }
        .kpi-card.destaque { border-left-color: var(--magenta); }
        .kpi-titulo { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-valor { font-size: 26px; font-weight: 700; color: var(--grafite); }
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 25px; }
        .chart-box { background: var(--branco); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .chart-title { font-size: 14px; font-weight: 700; color: var(--lilas); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;}
        .chart-container { position: relative; height: 300px; width: 100%; }
        @media (max-width: 1200px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-titulo">Investimento Total (PO)</div><div class="kpi-valor" id="kpiGasto">R$ 0,00</div></div>
        <div class="kpi-card destaque"><div class="kpi-titulo">Total de Requisições</div><div class="kpi-valor" id="kpiPedidos" style="color: var(--magenta);">0</div></div>
    </div>
    <div class="charts-grid">
        <div class="chart-box"><div class="chart-title"><i class="fa-solid fa-chart-area"></i> Volume Sazonal</div><div class="chart-container"><canvas id="chartSazonalidade"></canvas></div></div>
        <div class="chart-box"><div class="chart-title"><i class="fa-solid fa-chart-pie"></i> Status dos Processos</div><div class="chart-container"><canvas id="chartStatus"></canvas></div></div>
    </div>
    <div class="charts-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="chart-box"><div class="chart-title"><i class="fa-solid fa-ranking-star"></i> Top Compradores</div><div class="chart-container"><canvas id="chartCompradores"></canvas></div></div>
        <div class="chart-box"><div class="chart-title"><i class="fa-solid fa-building"></i> Pedidos por Unidade</div><div class="chart-container"><canvas id="chartUnidades"></canvas></div></div>
    </div>

    <script>
        Chart.defaults.font.family = "'Inter', sans-serif";
        let graficos = {};

        async function carregarDashboard() {
            const resp = await fetch('http://localhost:8000/dashboard-dados');
            const dados = await resp.json();

            // Atualiza KPIs
            document.getElementById('kpiGasto').innerText = dados.kpis.total_gasto ? `R$ ${dados.kpis.total_gasto.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 'R$ 0,00';
            document.getElementById('kpiPedidos').innerText = dados.kpis.total_pedidos;

            // 1. Sazonalidade
            graficos.sazonalidade = new Chart(document.getElementById('chartSazonalidade'), {
                type: 'line',
                data: { labels: dados.sazonalidade.map(d => d.mes), datasets: [{ label: 'Requisições', data: dados.sazonalidade.map(d => d.qtd), borderColor: '#422c76', backgroundColor: 'rgba(66, 44, 118, 0.2)', borderWidth: 3, fill: true, tension: 0.4, pointBackgroundColor: '#422c76', pointRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 2. Status
            graficos.status = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: { labels: dados.status.map(d => d.status), datasets: [{ data: dados.status.map(d => d.qtd), backgroundColor: ['#ff2f69', '#422c76', '#414042', '#01E18E', '#f5b041'], borderWidth: 0, cutout: '70%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // 3. Compradores
            graficos.compradores = new Chart(document.getElementById('chartCompradores'), {
                type: 'bar',
                data: { labels: dados.compradores.map(d => d.nome), datasets: [{ data: dados.compradores.map(d => d.qtd), backgroundColor: '#422c76', borderRadius: 4 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
            });

            // 4. Unidades
            graficos.unidades = new Chart(document.getElementById('chartUnidades'), {
                type: 'bar',
                data: { labels: dados.unidades.map(d => d.unidade), datasets: [{ data: dados.unidades.map(d => d.qtd), backgroundColor: '#ff2f69', borderRadius: 4, barPercentage: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }
        window.onload = carregarDashboard;
    </script>
</body>
</html>
